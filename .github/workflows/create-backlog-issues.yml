name: Create Backlog Issues

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for create_branch_from_default
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Implement \`create_branch_from_default\` in GitHubClient" \
            --body "## Summary

The \`create_branch_from_default\` method in \`GitHubClient\` (\`src/agent.py\`) is currently unimplemented (contains only a \`pass\` statement). It needs to be implemented so the agent can create a new branch from the repository's default branch before committing changes.

## Steps to Implement

1. **GET the default branch and its latest commit SHA**
   - Use the existing \`get_default_branch()\` helper to get the branch name
   - Call \`GET /repos/{owner}/{repo}/git/ref/heads/{default_branch}\` to obtain the latest commit SHA

2. **POST to create a new branch ref**
   - Call \`POST /repos/{owner}/{repo}/git/refs\` with the payload:
     \`\`\`json
     { \"ref\": \"refs/heads/{branch_name}\", \"sha\": \"{latest_commit_sha}\" }
     \`\`\`

## Context

This method is called by \`create_merge_request_tool\` before committing file changes and opening a pull request. Without this implementation, the agent cannot create branches and therefore cannot open pull requests.

\`\`\`python

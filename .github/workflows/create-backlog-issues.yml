    # NOTE: this is simplified scaffolding; you'll likely want to:
    # 1. GET default branch + its latest commit SHA
    # 2. POST /git/refs to create a new branch ref
    pass
\`\`\`"

      - name: Create issue for commit_changes_to_branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Implement \`commit_changes_to_branch\` in GitHubClient" \
            --body "## Summary

The \`commit_changes_to_branch\` method in \`GitHubClient\` (\`src/agent.py\`) is currently unimplemented (contains only a \`pass\` statement). It needs to be implemented so the agent can commit file changes to a branch before opening a pull request.

## Steps to Implement

Choose **one** of the two approaches below:

### Option A: Contents API (simpler, file-by-file)
For each \`FileChange\` in \`plan.changes\`:
1. Call \`GET /repos/{owner}/{repo}/contents/{path}?ref={branch}\` to fetch the current file SHA (if the file exists)
2. Call \`PUT /repos/{owner}/{repo}/contents/{path}\` with the payload:
   \`\`\`json
   {
     \"message\": \"{change.message}\",
     \"content\": \"<base64-encoded content>\",
     \"branch\": \"{plan.branch_name}\",
     \"sha\": \"<existing file SHA, if updating>\"
   }
   \`\`\`

### Option B: Git Data API (more control, single commit)
1. Get the latest commit SHA for the branch
2. Get the base tree SHA from the commit
3. Create new blob(s) via \`POST /repos/{owner}/{repo}/git/blobs\`
4. Create a new tree via \`POST /repos/{owner}/{repo}/git/trees\`
5. Create a new commit via \`POST /repos/{owner}/{repo}/git/commits\`
6. Update the branch ref via \`PATCH /repos/{owner}/{repo}/git/refs/heads/{branch}\`

## Context

This method is called by \`create_merge_request_tool\` after \`create_branch_from_default\` and before \`open_pull_request\`. Without this implementation, the agent cannot write code changes to a branch.

